<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat History</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='history.css') }}">

</head>

<body>

<div class="container">

<h1>Chat History</h1>

<a href="/dashboard" class="back">

⬅ Dashboard

</a>

<table>

<tr>

<th>Question</th>

<th>Answer</th>

<th>Date</th>

</tr>

{% for chat in chats %}

<tr>

<td>{{ chat.question }}</td>

<td>{{ chat.answer }}</td>

<td>{{ chat.created_at }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
