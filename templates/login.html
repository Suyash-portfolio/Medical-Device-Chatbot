<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | AI Medical Device Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>AI Medical Device Chatbot</h1>

<p>

Secure Medical Device Information Platform

</p>

<img src="{{ url_for('static',filename='images/login.png') }}">

</div>

<div class="right">

<form id="loginForm">

<h2>Welcome Back 👋</h2>

<p>

Login to continue

</p>

<div class="inputBox">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="inputBox">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

<i
class="fa-solid fa-eye togglePassword"
onclick="togglePassword()">

</i>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">

Login

</button>

<div id="message"></div>

<div class="divider">

OR

</div>

<button
type="button"
class="google">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<p class="signup">

Don't have an account?

<a href="/signup">

Create Account

</a>

</p>

</form>

</div>

</div>

<script src="{{ url_for('static',filename='login.js') }}"></script>

</body>

</html>
