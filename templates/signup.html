<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='signup.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>AI Medical Device Chatbot</h1>

<p>Create your account to continue</p>

</div>

<div class="right">

<form id="signupForm">

<h2>Create Account</h2>

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">

Create Account

</button>

<p id="message"></p>

<p>

Already have an account?

<a href="/">Login</a>

</p>

</form>

</div>

</div>

<script src="{{ url_for('static', filename='signup.js') }}"></script>

</body>

</html>
